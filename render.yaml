services:
  - type: web
    name: jarvis-chatbot-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    autoDeploy: true
    envVars:
      - key: DISABLE_WAKE_WORD
        value: "1"
      - key: PYTHON_VERSION
        value: "3.12.2"
